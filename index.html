<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meet Lite</title>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

header {
  padding: 12px;
  display: flex;
  justify-content: space-between;
  background: #111a2e;
  align-items: center;
}

input, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  cursor: pointer;
  background: #3b82f6;
  color: white;
}

button:hover { background: #2563eb; }

#videos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 10px;
  padding: 10px;
}

video {
  width: 100%;
  border-radius: 12px;
  background: black;
}

.controls {
  display: flex;
  gap: 10px;
}

#status {
  font-size: 13px;
  opacity: 0.7;
}
</style>
</head>

<body>

<header>
  <div>
    <b>Meet Lite</b>
    <div id="status">Not connected</div>
  </div>

  <div class="controls">
    <input id="roomInput" placeholder="Room ID"/>
    <button onclick="createRoom()">Create</button>
    <button onclick="joinRoom()">Join</button>
  </div>
</header>

<div id="videos"></div>

<script>
let peer;
let localStream;
let currentCalls = {};
let myId;

const videos = document.getElementById("videos");
const statusEl = document.getElementById("status");

function log(msg){
  statusEl.innerText = msg;
}

async function getMedia(){
  if (localStream) return;

  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  addVideo(localStream, true, "me");
}

function addVideo(stream, muted=false, id=""){
  if(document.getElementById("vid-"+id)) return;

  const video = document.createElement("video");
  video.id = "vid-" + id;
  video.srcObject = stream;
  video.autoplay = true;
  video.playsInline = true;
  video.muted = muted;
  videos.appendChild(video);
}

function startPeer(id){
  peer = new Peer(id, {
    host: "0.peerjs.com",
    secure: true,
    port: 443
  });

  peer.on("open", () => {
    log("Connected: " + id);
  });

  peer.on("call", call => {
    call.answer(localStream);

    call.on("stream", remoteStream => {
      addVideo(remoteStream, false, call.peer);
    });

    currentCalls[call.peer] = call;
  });
}

async function createRoom(){
  await getMedia();

  const room = Math.random().toString(36).substring(2, 8);
  document.getElementById("roomInput").value = room;

  myId = room;
  startPeer(room);

  history.replaceState({}, "", "?room=" + room);
  log("Room created: " + room);
}

async function joinRoom(){
  await getMedia();

  const room = document.getElementById("roomInput").value.trim();
  if(!room) return alert("Enter room ID");

  myId = Math.random().toString(36).substring(2, 10);
  startPeer(myId);

  peer.on("open", () => {
    const call = peer.call(room, localStream);

    call.on("stream", remoteStream => {
      addVideo(remoteStream, false, room);
    });

    currentCalls[room] = call;
    log("Joined room: " + room);
  });
}

function autoJoin(){
  const params = new URLSearchParams(location.search);
  const room = params.get("room");
  if(room){
    document.getElementById("roomInput").value = room;
  }
}

autoJoin();
</script>

</body>
</html>
